<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h2>Admin Dashboard</h2>

<div align="center">
<form method="POST">
<input type="text" name="search" placeholder="Search by username">
<button type="submit">Search</button>
</form>

<br>
<a href="/logout"><button>Logout</button></a>
</div>

<table border="1">
<tr>
<th>ID</th>
<th>User</th>
<th>Description</th>
<th>Image</th>
<th>Status</th>
<th>Update</th>
</tr>

{% for row in data %}
<tr align="center">
<td>{{row[0]}}</td>
<td>{{row[1]}}</td>
<td>{{row[2]}}</td>
<td><img src="{{ url_for('static', filename='uploads/' + row[3]) }}" width="100"></td>
<td>{{row[4]}}</td>

<td>
<form method="POST" action="/update_status/{{row[0]}}">
<select name="status">
<option value="Pending">Pending</option>
<option value="Processing">Processing</option>
<option value="Completed">Completed</option>
</select>
<button type="submit">Update</button>
</form>
</td>
</tr>
{% endfor %}
</table>

</body>
</html>
